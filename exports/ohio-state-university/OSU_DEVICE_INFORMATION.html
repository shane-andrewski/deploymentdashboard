<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OSU - Deployment Summary</title>
  <style>
    :root {
      --bg: #070a12;
      --panel: rgba(14, 18, 32, 0.92);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text: #e8ecf3;
      --muted: #94a0b8;
      --accent: #eb4bc6;
      --grid: rgba(57, 67, 97, 0.25);
      --shadow: rgba(0, 0, 0, 0.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Helvetica Neue", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(0, 194, 255, 0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(235, 75, 198, 0.12), transparent 24%),
        linear-gradient(180deg, #0a0f1b 0%, #060810 100%);
      min-height: 100vh;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      min-height: 100vh;
    }
    .canvas-wrap {
      position: relative;
      overflow: auto;
      padding: 24px;
    }
    .canvas-card {
      position: relative;
      min-width: fit-content;
      background:
        linear-gradient(rgba(255,255,255,0.02), rgba(255,255,255,0.01)),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px),
        linear-gradient(var(--grid) 1px, transparent 1px);
      background-size: auto, 32px 32px, 32px 32px;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 22px;
      box-shadow: 0 24px 80px var(--shadow);
      overflow: hidden;
    }
    svg {
      display: block;
      background: transparent;
    }
    .sidebar {
      border-left: 1px solid var(--panel-border);
      background: linear-gradient(180deg, rgba(17, 17, 26, 0.96), rgba(10, 12, 22, 0.96));
      backdrop-filter: blur(12px);
      padding: 28px 24px;
      overflow: auto;
    }
    .eyebrow {
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.1;
    }
    .summary {
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .summary-editor {
      min-height: 84px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      outline: none;
      white-space: pre-wrap;
    }
    .summary-editor:empty::before {
      content: attr(data-placeholder);
      color: rgba(148, 160, 184, 0.72);
    }
    .sidebar-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }
    .action-button {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font: inherit;
      padding: 10px 12px;
      cursor: pointer;
    }
    .action-button:hover {
      background: rgba(255,255,255,0.08);
    }
    .status-note {
      margin-bottom: 22px;
      color: var(--muted);
      font-size: 12px;
      min-height: 18px;
    }
    .meta {
      display: grid;
      gap: 10px;
      margin-bottom: 28px;
    }
    .meta-card {
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.03);
    }
    .meta-label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .meta-value {
      margin-top: 6px;
      font-size: 18px;
      font-weight: 700;
    }
    .detail-panel {
      border: 1px solid var(--panel-border);
      border-radius: 20px;
      padding: 20px;
      background: var(--panel);
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .detail-title {
      margin: 0;
      font-size: 24px;
    }
    .detail-type {
      display: inline-flex;
      margin-top: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      color: #f5e7bc;
      background: rgba(245, 231, 188, 0.12);
      border: 1px solid rgba(245, 231, 188, 0.2);
    }
    .detail-notes {
      margin-top: 16px;
      color: var(--muted);
      white-space: pre-wrap;
      line-height: 1.5;
    }
    .issue-section {
      margin-top: 18px;
    }
    .issue-heading {
      margin: 0 0 10px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffb4b6;
    }
    .issue-heading.resolved {
      color: #98f3bb;
    }
    .issue-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
    }
    .issue-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      color: #fff4f4;
      background: rgba(255, 90, 95, 0.18);
      border: 1px solid rgba(255, 90, 95, 0.35);
    }
    .issue-pill.resolved {
      color: #ecfff2;
      background: rgba(34, 197, 94, 0.18);
      border-color: rgba(34, 197, 94, 0.34);
    }
    .issue-row {
      display: grid;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .issue-row.resolved {
      background: rgba(34, 197, 94, 0.08);
      border-color: rgba(34, 197, 94, 0.18);
    }
    .issue-row-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    details.issue-details > summary {
      cursor: pointer;
      list-style: none;
    }
    details.issue-details > summary::-webkit-details-marker {
      display: none;
    }
    .issue-summary-main {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      flex: 1 1 auto;
      min-width: 0;
    }
    .issue-chevron {
      color: var(--muted);
      font-size: 12px;
      transition: transform 120ms ease;
    }
    details[open] .issue-chevron {
      transform: rotate(90deg);
    }
    .issue-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .issue-action-button {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font: inherit;
      font-size: 12px;
      padding: 6px 10px;
      cursor: pointer;
    }
    .issue-action-button:hover {
      background: rgba(255,255,255,0.08);
    }
    .issue-action-button.resolve {
      border-color: rgba(34, 197, 94, 0.34);
      background: rgba(34, 197, 94, 0.12);
      color: #d8ffe6;
    }
    .issue-action-button.reopen {
      border-color: rgba(255, 90, 95, 0.34);
      background: rgba(255, 90, 95, 0.12);
      color: #ffe5e6;
    }
    .issue-text {
      color: #ffd9da;
      font-size: 18px;
      line-height: 1.35;
    }
    .issue-notes {
      color: #ffd9da;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .issue-row.resolved .issue-text,
    .issue-row.resolved .issue-notes {
      color: #c8f7d6;
    }
    .issue-create {
      display: grid;
      gap: 10px;
      margin-top: 18px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .issue-create-input {
      min-height: 44px;
      padding: 10px 12px;
      border-radius: 12px;
      outline: none;
      color: var(--text);
      white-space: pre-wrap;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .issue-create-notes {
      min-height: 84px;
      padding: 10px 12px;
      border-radius: 12px;
      outline: none;
      color: var(--text);
      white-space: pre-wrap;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .issue-create-input:empty::before,
    .issue-create-notes:empty::before {
      content: attr(data-placeholder);
      color: rgba(148, 160, 184, 0.72);
    }
    .issue-create-actions {
      display: flex;
      justify-content: flex-end;
    }
    .issue-action-button.add {
      border-color: rgba(0, 194, 255, 0.34);
      background: rgba(0, 194, 255, 0.12);
      color: #d9f7ff;
    }
    .prop-list {
      margin: 20px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
    }
    .prop-item {
      display: grid;
      gap: 4px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .prop-key {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .prop-value {
      font-size: 15px;
      line-height: 1.35;
      word-break: break-word;
    }
    .editable {
      outline: none;
      border-radius: 10px;
      transition: background 120ms ease, border-color 120ms ease;
    }
    .editable:hover {
      background: rgba(255,255,255,0.04);
    }
    .editable:focus {
      background: rgba(255,255,255,0.06);
      box-shadow: inset 0 0 0 1px rgba(235, 75, 198, 0.55);
    }
    .editable:empty::before {
      content: attr(data-placeholder);
      color: rgba(148, 160, 184, 0.72);
    }
    .detail-notes.editable {
      padding: 10px 12px;
    }
    .prop-value.editable {
      padding: 8px 10px;
      min-height: 38px;
      white-space: pre-wrap;
    }
    .device-group {
      cursor: pointer;
      transition: transform 140ms ease, filter 140ms ease;
    }
    .device-group:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }
    .device-group.active .device-body {
      stroke: #ffd54f;
      stroke-width: 4;
    }
    .device-group.active .device-tab {
      stroke: #ffd54f;
      stroke-width: 2;
    }
    .device-title {
      fill: #ffffff;
      font-size: 11px;
      font-weight: 700;
      text-anchor: middle;
      pointer-events: none;
    }
    .device-preview {
      fill: #ededed;
      font-size: 8px;
      font-family: Consolas, "Courier New", monospace;
      text-anchor: middle;
      pointer-events: none;
    }
    .tab-text {
      fill: #5b4725;
      font-size: 8px;
      font-weight: 700;
      text-anchor: middle;
      pointer-events: none;
    }
    .issue-badge-text {
      fill: #fff4f4;
      font-size: 8px;
      font-weight: 700;
      text-anchor: middle;
      pointer-events: none;
    }
    .connection-path {
      fill: none;
      stroke-width: 2.5;
      opacity: 0.96;
    }
    .empty-state {
      color: var(--muted);
      line-height: 1.5;
    }
    @media (max-width: 1100px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .sidebar {
        border-left: 0;
        border-top: 1px solid var(--panel-border);
      }
    }
  </style>
</head>

2d-b81c-572940d174a4","target_id":"fa5b8cc9-b17e-417a-8956-0ca61770b4db","color":"#ff0000","sx":289,"sy":321.9216084959665,"cx":323.7560833551502,"cy":321.8732208963516,"tx":358.51216671030045,"ty":321.8248332967367}]}</script>
  <script>
    const exportDataElement = document.getElementById("export-data");
    const exportData = JSON.parse(exportDataElement.textContent);
    const devices = Array.isArray(exportData.devices) ? exportData.devices : [];
    const connections = Array.isArray(exportData.connections) ? exportData.connections : [];
    const storageKey = `deployment-summary:${location.pathname}`;
    const svg = document.querySelector("svg");
    const devicesLayer = document.getElementById("devices-layer");
    const connectionsLayer = document.getElementById("connections-layer");
    const detailPanel = document.getElementById("detail-panel");
    const deploymentName = document.getElementById("deployment-name");
    const deploymentSummary = document.getElementById("deployment-summary");
    const statusNote = document.getElementById("status-note");
    const downloadButton = document.getElementById("download-html");
    const resetButton = document.getElementById("reset-browser-edits");
    let activeDeviceId = null;

    svg.setAttribute("viewBox", `0 0 ${exportData.width} ${exportData.height}`);
    svg.setAttribute("width", exportData.width);
    svg.setAttribute("height", exportData.height);
    deploymentName.textContent = exportData.deployment_name || "Deployment Summary";
    deploymentSummary.textContent = exportData.deployment_summary || "";
    document.title = `${exportData.deployment_name || "Deployment Summary"} - Deployment Summary`;

    function roundedRectPath(x, y, width, height, radius) {
      const r = Math.max(0, Math.min(radius, width / 2 - 1, height / 2 - 1));
      return [
        `M ${x + r} ${y}`,
        `L ${x + width - r} ${y}`,
        `Q ${x + width} ${y} ${x + width} ${y + r}`,
        `L ${x + width} ${y + height - r}`,
        `Q ${x + width} ${y + height} ${x + width - r} ${y + height}`,
        `L ${x + r} ${y + height}`,
        `Q ${x} ${y + height} ${x} ${y + height - r}`,
        `L ${x} ${y + r}`,
        `Q ${x} ${y} ${x + r} ${y}`,
        "Z"
      ].join(" ");
    }

    function tabPoints(device) {
      const tabWidth = Math.min(118, Math.max(84, device.width * 0.52));
      const tabHeight = Math.min(24, Math.max(18, device.height * 0.24));
      const left = device.x - tabWidth / 2;
      const right = device.x + tabWidth / 2;
      const top = device.y - device.height / 2 - tabHeight + 6;
      const bottom = device.y - device.height / 2 + 6;
      const notch = Math.min(12, (right - left) * 0.18);
      return `${left},${bottom} ${left},${top + 6} ${left + notch},${top} ${right - notch},${top} ${right},${top + 6} ${right},${bottom}`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function setStatus(message) {
      statusNote.textContent = message;
    }

    function normalizeIssues(issues) {
      const normalized = (Array.isArray(issues) ? issues : [])
        .map(issue => {
          if (typeof issue === "string") {
            return { text: issue, notes: "", resolved: false };
          }
          return {
            text: String(issue && (issue.text || issue.name) ? (issue.text || issue.name) : ""),
            notes: String(issue && issue.notes ? issue.notes : ""),
            resolved: Boolean(issue && issue.resolved),
          };
        })
        .filter(issue => issue.text.trim());

      function looksLikeIssueNotes(text) {
        const value = String(text || "").trim();
        return value.length > 60 || /[.!?]/.test(value) || value.split(/\s+/).length > 8;
      }

      function looksLikeIssueTitle(text) {
        const value = String(text || "").trim();
        return value && value.length <= 60 && !/[.!?]/.test(value) && value.split(/\s+/).length <= 8;
      }

      const merged = [];
      for (let index = 0; index < normalized.length; index += 1) {
        const current = normalized[index];
        const next = normalized[index + 1];
        if (
          next &&
          !current.notes &&
          !next.notes &&
          current.resolved === next.resolved &&
          (
            (looksLikeIssueNotes(current.text) && looksLikeIssueTitle(next.text)) ||
            (looksLikeIssueTitle(current.text) && looksLikeIssueNotes(next.text))
          )
        ) {
          const titleIssue = looksLikeIssueTitle(current.text) ? current : next;
          const notesIssue = titleIssue === current ? next : current;
          merged.push({
            text: titleIssue.text,
            notes: notesIssue.text,
            resolved: titleIssue.resolved,
          });
          index += 1;
          continue;
        }
        merged.push(current);
      }
      return merged;
    }

    function getIssueCounts(device) {
      const issues = normalizeIssues(device.issues);
      return {
        open: issues.filter(issue => !issue.resolved).length,
        resolved: issues.filter(issue => issue.resolved).length,
        total: issues.length,
      };
    }

    function buildPreviewLines(device) {
      const properties = Object.entries(device.properties || {})
        .filter(([key]) => !device.property_visibility || device.property_visibility[key] !== false)
        .slice(0, 3);
      if (!properties.length) {
        return ["No properties yet"];
      }
      return properties.map(([key, value]) => `${key}: ${String(value ?? "").trim() ? value : "-"}`);
    }

    function refreshDerivedDeviceState() {
      devices.forEach(device => {
        device.issues = normalizeIssues(device.issues);
        device.preview = buildPreviewLines(device);
      });
    }

    function buildHtmlOutput() {
      exportData.deployment_summary = deploymentSummary.textContent.trim();
      exportData.devices = devices;
      exportDataElement.textContent = JSON.stringify(exportData);
      return "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
    }

    function persistState(message = "Browser edits saved for this HTML file.") {
      exportData.deployment_summary = deploymentSummary.textContent.trim();
      exportData.devices = devices;
      exportDataElement.textContent = JSON.stringify(exportData);
      try {
        localStorage.setItem(storageKey, JSON.stringify({
          deployment_summary: exportData.deployment_summary,
          devices: devices.map(device => ({
            id: device.id,
            notes: device.notes || "",
            properties: device.properties || {},
            issues: normalizeIssues(device.issues),
          })),
        }));
      } catch (_error) {
        setStatus("Edit applied, but browser storage is unavailable.");
        return;
      }
      setStatus(message);
    }

    function hydrateSavedState() {
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey) || "null");
        if (!saved) return;
        if (typeof saved.deployment_summary === "string") {
          exportData.deployment_summary = saved.deployment_summary;
          deploymentSummary.textContent = saved.deployment_summary;
        }
        const savedDevices = new Map((saved.devices || []).map(device => [device.id, device]));
        devices.forEach(device => {
          const savedDevice = savedDevices.get(device.id);
          if (!savedDevice) return;
          if (savedDevice.properties && typeof savedDevice.properties === "object") {
            device.properties = { ...device.properties, ...savedDevice.properties };
          }
          if (typeof savedDevice.notes === "string") {
            device.notes = savedDevice.notes;
          }
          if (Array.isArray(savedDevice.issues)) {
            device.issues = normalizeIssues(savedDevice.issues);
          }
        });
      } catch (_error) {
        setStatus("Saved browser edits could not be loaded.");
      }
    }

    function renderConnections() {
      connectionsLayer.innerHTML = "";
      connections.forEach(connection => {
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("class", "connection-path");
        path.setAttribute("stroke", connection.color);
        path.setAttribute("d", `M ${connection.sx} ${connection.sy} Q ${connection.cx} ${connection.cy} ${connection.tx} ${connection.ty}`);
        if (exportData.show_connection_arrows) {
          path.setAttribute("marker-end", "url(#arrowhead)");
        }
        connectionsLayer.appendChild(path);
      });
    }

    function renderDevices() {
      devicesLayer.innerHTML = "";
      devices.forEach(device => {
        const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
        group.setAttribute("class", "device-group");
        if (activeDeviceId === device.id) {
          group.classList.add("active");
        }
        group.setAttribute("data-device-id", device.id);

        const left = device.x - device.width / 2;
        const top = device.y - device.height / 2;

        const shadow = document.createElementNS("http://www.w3.org/2000/svg", "path");
        shadow.setAttribute("d", roundedRectPath(left + 4, top + 5, device.width, device.height, device.corner_radius));
        shadow.setAttribute("fill", "#020305");
        shadow.setAttribute("opacity", "0.92");

        const body = document.createElementNS("http://www.w3.org/2000/svg", "path");
        body.setAttribute("class", "device-body");
        body.setAttribute("d", roundedRectPath(left, top, device.width, device.height, device.corner_radius));
        body.setAttribute("fill", device.fill_color);
        body.setAttribute("stroke", "#262c3d");
        body.setAttribute("stroke-width", "2");

        const inner = document.createElementNS("http://www.w3.org/2000/svg", "path");
        inner.setAttribute("d", roundedRectPath(left + 6, top + 6, device.width - 12, device.height - 12, Math.max(0, device.corner_radius - 6)));
        inner.setAttribute("fill", "none");
        inner.setAttribute("stroke", "#ffffff");
        inner.setAttribute("stroke-opacity", "0.4");
        inner.setAttribute("stroke-width", "1");

        const tabShadow = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
        tabShadow.setAttribute("points", tabPoints({...device, x: device.x + 2, y: device.y + 2}));
        tabShadow.setAttribute("fill", "#020305");

        const tab = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
        tab.setAttribute("class", "device-tab");
        tab.setAttribute("points", tabPoints(device));
        tab.setAttribute("fill", "#f5e7bc");
        tab.setAttribute("stroke", "#262c3d");
        tab.setAttribute("stroke-width", "1");

        const tabText = document.createElementNS("http://www.w3.org/2000/svg", "text");
        tabText.setAttribute("class", "tab-text");
        tabText.setAttribute("x", device.x);
        tabText.setAttribute("y", device.y - device.height / 2 - 3);
        tabText.textContent = device.category || device.device_type;

        const title = document.createElementNS("http://www.w3.org/2000/svg", "text");
        title.setAttribute("class", "device-title");
        title.setAttribute("x", device.x);
        title.setAttribute("y", device.y - 8);
        title.textContent = device.title;

        const preview = document.createElementNS("http://www.w3.org/2000/svg", "text");
        preview.setAttribute("class", "device-preview");
        preview.setAttribute("x", device.x);
        preview.setAttribute("y", device.y + 18);
        const previewLines = device.preview && device.preview.length ? device.preview : ["No properties yet"];
        previewLines.forEach((line, index) => {
          const span = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
          span.setAttribute("x", device.x);
          span.setAttribute("dy", index === 0 ? "0" : "12");
          span.textContent = line;
          preview.appendChild(span);
        });

        const issueCounts = getIssueCounts(device);

        group.appendChild(shadow);
        group.appendChild(body);
        group.appendChild(inner);
        group.appendChild(tabShadow);
        group.appendChild(tab);
        group.appendChild(tabText);
        group.appendChild(title);
        group.appendChild(preview);

        if (issueCounts.open) {
          const badgeTextValue = issueCounts.open > 1 ? `OPEN ${issueCounts.open}` : "OPEN";
          const badgeWidth = badgeTextValue.length > 8 ? 88 : 76;
          const badgeHeight = 22;
          const badgeLeft = left + device.width - badgeWidth - 10;
          const badgeTop = top + 10;

          const badge = document.createElementNS("http://www.w3.org/2000/svg", "path");
          badge.setAttribute("d", roundedRectPath(badgeLeft, badgeTop, badgeWidth, badgeHeight, 10));
          badge.setAttribute("fill", "#ff5a5f");

          const badgeText = document.createElementNS("http://www.w3.org/2000/svg", "text");
          badgeText.setAttribute("class", "issue-badge-text");
          badgeText.setAttribute("x", badgeLeft + badgeWidth / 2);
          badgeText.setAttribute("y", badgeTop + badgeHeight / 2 + 3);
          badgeText.textContent = badgeTextValue;

          group.appendChild(badge);
          group.appendChild(badgeText);
        }

        group.addEventListener("click", () => showDeviceDetails(device.id));
        devicesLayer.appendChild(group);
      });
    }

    function bindDetailEditors(device) {
      const notesEditor = detailPanel.querySelector(".detail-notes.editable");
      if (notesEditor) {
        notesEditor.addEventListener("input", () => {
          device.notes = notesEditor.textContent;
          persistState(`Updated notes for ${device.title}.`);
        });
      }

      detailPanel.querySelectorAll(".prop-value.editable").forEach(editor => {
        const propKey = editor.dataset.propKey;
        editor.addEventListener("input", () => {
          device.properties[propKey] = editor.textContent;
          persistState(`Updated ${propKey} for ${device.title}.`);
        });
        editor.addEventListener("blur", () => {
          device.preview = buildPreviewLines(device);
          renderDevices();
          showDeviceDetails(device.id);
        });
      });

      detailPanel.querySelectorAll("[data-issue-action]").forEach(button => {
        button.addEventListener("click", event => {
          event.preventDefault();
          event.stopPropagation();
          const issueIndex = Number(button.dataset.issueIndex);
          const action = button.dataset.issueAction;
          if (!Number.isFinite(issueIndex) || !device.issues[issueIndex]) return;
          if (action === "resolve") {
            device.issues[issueIndex].resolved = true;
            persistState(`Resolved an issue for ${device.title}.`);
          } else if (action === "reopen") {
            device.issues[issueIndex].resolved = false;
            persistState(`Reopened an issue for ${device.title}.`);
          }
          refreshDerivedDeviceState();
          renderDevices();
          showDeviceDetails(device.id);
        });
      });

      const addIssueInput = detailPanel.querySelector("#new-issue-input");
      const addIssueNotesInput = detailPanel.querySelector("#new-issue-notes");
      const addIssueButton = detailPanel.querySelector("#add-issue-button");
      if (addIssueInput && addIssueNotesInput && addIssueButton) {
        const submitIssue = () => {
          const issueText = addIssueInput.textContent.trim();
          const issueNotes = addIssueNotesInput.textContent.trim();
          if (!issueText) {
            setStatus(`Enter an issue name for ${device.title} first.`);
            return;
          }
          device.issues = normalizeIssues(device.issues);
          device.issues.unshift({ text: issueText, notes: issueNotes, resolved: false });
          refreshDerivedDeviceState();
          persistState(`Added a new issue to ${device.title}.`);
          renderDevices();
          showDeviceDetails(device.id);
        };

        addIssueButton.addEventListener("click", submitIssue);
        addIssueInput.addEventListener("keydown", event => {
          if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
            event.preventDefault();
            submitIssue();
          }
        });
      }
    }

    function showDeviceDetails(deviceId) {
      const device = devices.find(item => item.id === deviceId);
      if (!device) return;
      activeDeviceId = deviceId;
      renderDevices();

      const properties = Object.entries(device.properties || {});
      const issues = normalizeIssues(device.issues);
      const openIssues = issues.filter(issue => !issue.resolved);
      const resolvedIssues = issues.filter(issue => issue.resolved);
      const propertyMarkup = properties.length
        ? properties.map(([key, value]) => `
            <li class="prop-item">
              <div class="prop-key">${escapeHtml(key)}</div>
              <div class="prop-value editable" contenteditable="true" spellcheck="false" data-placeholder="Enter value" data-prop-key="${escapeHtml(key)}">${escapeHtml(value || "")}</div>
            </li>
          `).join("")
        : `<li class="prop-item"><div class="prop-value">No properties configured.</div></li>`;
      const issueMarkup = `
            <section class="issue-create">
              <h3 class="issue-heading">Add Issue</h3>
              <div class="issue-create-input" id="new-issue-input" contenteditable="true" spellcheck="false" data-placeholder="Issue name"></div>
              <div class="issue-create-notes" id="new-issue-notes" contenteditable="true" spellcheck="false" data-placeholder="Issue notes"></div>
              <div class="issue-create-actions">
                <button class="issue-action-button add" id="add-issue-button" type="button">Add Issue</button>
              </div>
            </section>
            ${issues.length ? `
            ${openIssues.length ? `<div class="issue-pill">${openIssues.length} Open Issue${openIssues.length === 1 ? "" : "s"}</div>` : ""}
            ${resolvedIssues.length ? `<div class="issue-pill resolved">${resolvedIssues.length} Resolved</div>` : ""}
            <section class="issue-section">
              <h3 class="issue-heading">Open Issues</h3>
              <ul class="issue-list">
                ${openIssues.length ? issues.map((issue, index) => !issue.resolved ? `
                  <li class="issue-row">
                    <details class="issue-details">
                      <summary class="issue-row-top">
                        <div class="issue-summary-main">
                          <span class="issue-chevron">▶</span>
                          <span class="issue-pill">Open</span>
                          <div class="issue-text">${escapeHtml(issue.text)}</div>
                        </div>
                        <div class="issue-actions">
                          <button class="issue-action-button resolve" type="button" data-issue-action="resolve" data-issue-index="${index}">Resolve</button>
                        </div>
                      </summary>
                      <div class="issue-notes">${issue.notes ? escapeHtml(issue.notes) : "No issue notes added."}</div>
                    </details>
                  </li>
                ` : "").join("") : `<li class="issue-row"><div class="issue-text">No open issues.</div></li>`}
              </ul>
            </section>
            ${resolvedIssues.length ? `
              <section class="issue-section">
                <h3 class="issue-heading resolved">Resolved Issues</h3>
                <ul class="issue-list">
                  ${issues.map((issue, index) => issue.resolved ? `
                    <li class="issue-row resolved">
                      <details class="issue-details">
                        <summary class="issue-row-top">
                          <div class="issue-summary-main">
                            <span class="issue-chevron">▶</span>
                            <span class="issue-pill resolved">Resolved</span>
                            <div class="issue-text">${escapeHtml(issue.text)}</div>
                          </div>
                          <div class="issue-actions">
                            <button class="issue-action-button reopen" type="button" data-issue-action="reopen" data-issue-index="${index}">Reopen</button>
                          </div>
                        </summary>
                        ${issue.notes ? `<div class="issue-notes">${escapeHtml(issue.notes)}</div>` : `<div class="issue-notes">No issue notes added.</div>`}
                      </details>
                    </li>
                  ` : "").join("")}
                </ul>
              </section>
            ` : ""}
          `
        : ""}`;

      detailPanel.innerHTML = `
        <h2 class="detail-title">${escapeHtml(device.title)}</h2>
        <div class="detail-type">${escapeHtml(device.category || device.device_type)}</div>
        <div class="detail-notes editable" contenteditable="true" spellcheck="false" data-placeholder="Add notes for this device">${escapeHtml(device.notes || "")}</div>
        ${issueMarkup}
        <ul class="prop-list">${propertyMarkup}</ul>
      `;
      bindDetailEditors(device);
    }

    deploymentSummary.addEventListener("input", () => {
      persistState("Updated deployment summary.");
    });

    downloadButton.addEventListener("click", () => {
      const htmlOutput = buildHtmlOutput();
      const blob = new Blob([htmlOutput], { type: "text/html;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `${(exportData.deployment_name || "deployment-summary").replace(/[\\/:*?"<>|]+/g, "_")}.html`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(link.href);
      setStatus("Downloaded an HTML file with your current edits.");
    });

    resetButton.addEventListener("click", () => {
      localStorage.removeItem(storageKey);
      location.reload();
    });

    hydrateSavedState();
    refreshDerivedDeviceState();
    renderConnections();
    renderDevices();
    if (devices.length) {
      showDeviceDetails(devices[0].id);
    }
  </script>


</body></html>
